name: Build Globe APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Fix Capacitor Ghost Files
        run: |
          # This deletes the line that looks for the missing cordova file
          sed -i '/apply from: "..\/capacitor-cordova-android-plugins\/cordova.variables.gradle"/d' android/app/capacitor.build.gradle
          # Create a fake empty file just in case Gradle still looks for the folder
          mkdir -p android/capacitor-cordova-android-plugins
          touch android/capacitor-cordova-android-plugins/cordova.variables.gradle

      - name: Build with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Globe-Observer-Release
          path: android/app/build/outputs/apk/debug/app-debug.apk
