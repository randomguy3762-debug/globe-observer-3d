name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: [push]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: [push]
          distribution: [push]
      - name: Remove broken dirs
        run: |
          rm -rf android/app/src/androidTest
          rm -rf android/app/src/test
          rm -rf android/capacitor-android/src/main/java/com/getcapacitor/cordova
      - name: Create cordova.variables.gradle
        run: |
          mkdir -p android/capacitor-cordova-android-plugins
          echo "ext { cordovaPlugins = [] }" > android/capacitor-cordova-android-plugins/cordova.variables.gradle
      - name: Patch build.gradle
        run: |
          sed -i '/apply from:.*cordova/d' android/build.gradle || true
          sed -i '/apply from:.*cordova/d' android/app/build.gradle || true
      - name: Copy game files to assets
        run: |
          mkdir -p android/app/src/main/assets/public
          cp -r www/* android/app/src/main/assets/public/
      - name: Make gradlew executable
        run: chmod +x android/gradlew
      - name: Build APK
        working-directory: android
        run: ./gradlew assembleDebug -x test -x lint --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
