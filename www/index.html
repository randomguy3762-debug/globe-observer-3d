<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accurate 3D Earth</title>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 4.2; 

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const textureLoader = new THREE.TextureLoader();

        // --- ACCURATE TEXTURE SOURCES ---
        // Using SolarSystemScope High-Res Equirectangular Maps
        const earthBase = 'https://www.solarsystemscope.com/textures/download/2k_earth_daymap.jpg';
        const earthClouds = 'https://www.solarsystemscope.com/textures/download/2k_earth_clouds.jpg';
        const earthNormal = 'https://www.solarsystemscope.com/textures/download/2k_earth_normal_map.jpg';

        // --- EARTH GROUP ---
        const earthGroup = new THREE.Group();
        scene.add(earthGroup);

        // --- THE PLANET ---
        // Increased segments to 128 for high-detail coastlines
        const geometry = new THREE.SphereGeometry(1, 128, 128); 
        const material = new THREE.MeshPhongMaterial({
            map: textureLoader.load(earthBase),
            normalMap: textureLoader.load(earthNormal),
            normalScale: new THREE.Vector2(0.5, 0.5),
            shininess: 8
        });
        const earth = new THREE.Mesh(geometry, material);
        earthGroup.add(earth);

        // --- THE CLOUDS ---
        const cloudGeom = new THREE.SphereGeometry(1.01, 128, 128);
        const cloudMat = new THREE.MeshPhongMaterial({
            map: textureLoader.load(earthClouds),
            transparent: true,
            opacity: 0.4,
            blending: THREE.AdditiveBlending
        });
        const clouds = new THREE.Mesh(cloudGeom, cloudMat);
        earthGroup.add(clouds);

        // --- LIGHTING ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0xffffff, 2.0);
        sunLight.position.set(5, 3, 5);
        scene.add(sunLight);

        // --- BACKGROUND STARS ---
        const starGeometry = new THREE.BufferGeometry();
        const starMaterial = new THREE.PointsMaterial({ color: 0x888888, size: 0.5 });
        const starVertices = [];
        for (let i = 0; i < 8000; i++) {
            const x = (Math.random() - 0.5) * 1500;
            const y = (Math.random() - 0.5) * 1500;
            const z = (Math.random() - 0.5) * 1500;
            starVertices.push(x, y, z);
        }
        starGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starVertices, 3));
        scene.add(new THREE.Points(starGeometry, starMaterial));

        // --- CONTROLS ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.enableZoom = false; // Zoom still locked
        controls.enablePan = false;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.4;

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function animate() {
            requestAnimationFrame(animate);
            clouds.rotation.y += 0.0002; // Realistic cloud drift
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
